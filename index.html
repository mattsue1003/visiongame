<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大腦視力同步訓練營</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            color: white;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        
        /* 16:9 容器 - 增加響應式處理 */
        .viewport-16-9 {
            width: 95vw;
            max-width: 1400px;
            max-height: 85vh;
            aspect-ratio: 16 / 9;
            background-color: #1e293b;
            border: 4px solid #334155;
            border-radius: 1.5rem;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(59, 130, 246, 0.2);
        }

        @media (max-aspect-ratio: 16/9) {
            .viewport-16-9 {
                width: 95vw;
                height: auto;
            }
        }

        .training-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .divider {
            width: 4px;
            background: linear-gradient(to bottom, transparent, #475569, transparent);
            height: 70%;
            align-self: center;
        }

        .symbol-svg {
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
        }

        .hand-tag {
            position: absolute;
            top: 6%;
            font-size: clamp(0.9rem, 2.5vw, 1.8rem);
            font-weight: 900;
            padding: 0.4rem 2rem;
            border-radius: 9999px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            z-index: 10;
        }
        .tag-left { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; }
        .tag-right { background: linear-gradient(135deg, #22c55e, #15803d); color: white; }
        
        /* 設定視窗 - 左上角 */
        #settingsModal {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 90vw;
            max-width: 380px;
            background: #1e293b;
            border: 2px solid #3b82f6;
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #settingsModal.collapsed {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            overflow: hidden;
            border-color: #334155;
        }

        .modal-header {
            padding: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .collapsed .modal-header { height: 100%; justify-content: center; padding: 0; }

        .modal-content {
            padding: 1.2rem;
            max-height: 75vh;
            overflow-y: auto;
        }

        .collapsed .modal-content, .collapsed .modal-title, .collapsed #closeIcon {
            display: none;
        }

        .btn-active {
            background-color: #3b82f6 !important;
            border-color: #60a5fa !important;
            color: white !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .main-title {
            animation: pulse-title 4s infinite ease-in-out;
        }
        @keyframes pulse-title {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.98); opacity: 0.9; }
        }

        /* 隱藏 YouTube 播放器 */
        #ytPlayerContainer {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- YouTube API 容器 -->
    <div id="ytPlayerContainer"><div id="player"></div></div>

    <!-- 頂部資訊列 -->
    <div class="fixed top-4 right-4 flex gap-3 md:gap-6 items-center z-50">
        <div id="timerDisplay" class="bg-blue-900/50 border border-blue-500/50 px-4 md:px-6 py-1 md:py-2 rounded-xl text-xl md:text-2xl font-mono text-blue-300 hidden">
            00:00
        </div>
        <div id="statusIndicator" class="px-4 py-1 rounded-full bg-slate-800 text-[10px] md:text-xs font-bold text-slate-400 border border-slate-700">
            READY
        </div>
    </div>

    <!-- 遊戲標題 -->
    <div class="mb-4 md:mb-6 text-center px-4">
        <h1 class="main-title text-2xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 tracking-tighter">
            大腦視力同步訓練營
        </h1>
    </div>

    <!-- 16:9 主畫面 -->
    <div class="viewport-16-9" id="gameViewport">
        <div id="zoneLeft" class="training-zone">
            <div id="tagLeft" class="hand-tag tag-left opacity-0">左手</div>
            <div id="symbolLeft" class="symbol-svg">
                <span class="text-slate-600 font-bold text-lg md:text-2xl tracking-widest px-6 text-center">點擊左上角齒輪開始</span>
            </div>
        </div>
        <div id="centerDivider" class="divider hidden"></div>
        <div id="zoneRight" class="training-zone">
            <div id="tagRight" class="hand-tag tag-right opacity-0">右手</div>
            <div id="symbolRight" class="symbol-svg"></div>
        </div>
    </div>

    <!-- 設定控制台 -->
    <div id="settingsModal" class="collapsed">
        <div class="modal-header" onclick="toggleSettings()">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span class="modal-title font-black text-lg">設定與指南</span>
            </div>
            <div id="closeIcon" class="text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 12-3-3-3 3"/></svg>
            </div>
        </div>

        <div class="modal-content space-y-5">
            <!-- 玩法指南 -->
            <div class="p-3 bg-blue-900/30 rounded-xl border border-blue-500/30 text-[11px] leading-relaxed">
                <h4 class="font-bold text-blue-300 mb-1">玩法說明：</h4>
                <ul class="space-y-1 text-slate-300">
                    <li>🎯 <b>單一中心：</b>單手比出正確開口方向。</li>
                    <li>👐 <b>左右同時：</b>雙手同時比出左右各自的方向。</li>
                    <li>🥁 <b>配合節拍：</b>跟著音樂節奏原地踏步或跑。</li>
                </ul>
            </div>

            <!-- 音樂控制 -->
            <div class="space-y-3 p-3 bg-emerald-900/20 rounded-xl border border-emerald-500/30">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold text-emerald-400">背景音樂 (YouTube)</span>
                    <button onclick="toggleMusic()" id="musicBtn" class="px-4 py-1 rounded bg-slate-700 text-slate-400 text-[10px] font-bold border border-slate-600 transition-colors">點選開啟</button>
                </div>
            </div>

            <!-- 核心模式 -->
            <div class="space-y-2">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">1. 核心模式</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setMode('single')" id="m-single" class="py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-300 font-bold text-xs">單一中心</button>
                    <button onclick="setMode('dual')" id="m-dual" class="py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-300 font-bold text-xs">左右同時</button>
                    <button onclick="setType('E')" id="t-E" class="py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-300 font-bold text-xs">E 視標</button>
                    <button onclick="setType('C')" id="t-C" class="py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-300 font-bold text-xs">C 視標</button>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setSizeMode('manual')" id="sz-manual" class="py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-300 font-bold text-[10px]">固定</button>
                    <button onclick="setSizeMode('random')" id="sz-random" class="py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-300 font-bold text-[10px]">隨機</button>
                    <button onclick="setSizeMode('shrink')" id="sz-shrink" class="py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-300 font-bold text-[10px]">遞減</button>
                </div>
            </div>

            <!-- 節奏與時間 -->
            <div class="space-y-3 p-3 bg-slate-800/50 rounded-xl">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">2. 節奏與時間</h3>
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold">訓練時長</span>
                    <select id="timeSelect" onchange="updateTimeSetting()" class="bg-slate-700 border-none rounded text-xs px-2 py-1">
                        <option value="60">1 分鐘</option>
                        <option value="120">2 分鐘</option>
                        <option value="180">3 分鐘</option>
                        <option value="300">5 分鐘</option>
                        <option value="0">不限時</option>
                    </select>
                </div>
                <hr class="border-slate-700">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold">節拍器</span>
                    <button onclick="toggleMetronome()" id="metroBtn" class="px-4 py-1 rounded bg-slate-700 text-slate-400 text-[10px] font-bold border border-slate-600">已關閉</button>
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-1">
                        <span>步頻 (BPM)</span>
                        <span id="bpmTxt" class="text-emerald-400 font-mono">120</span>
                    </div>
                    <input type="range" id="bpmIn" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer" min="90" max="200" step="1" value="120" oninput="updateSettings()">
                </div>
            </div>

            <!-- 精細調整 -->
            <div class="space-y-4">
                <div id="manualSizeControl">
                    <div class="flex justify-between text-[10px] mb-1">
                        <span>符號基準大小</span>
                        <span id="sizeTxt" class="text-blue-400 font-mono">200px</span>
                    </div>
                    <input type="range" id="sizeIn" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer" min="40" max="400" step="10" value="200" oninput="updateSettings()">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-1">
                        <span>變換速度 (秒)</span>
                        <span id="speedTxt" class="text-blue-400 font-mono">2.0s</span>
                    </div>
                    <input type="range" id="speedIn" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer" min="0.3" max="5" step="0.1" value="2.0" oninput="updateSettings()">
                </div>
            </div>

            <div class="pt-2 space-y-2">
                <button id="startBtn" onclick="toggleGame()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white text-xl font-black rounded-xl shadow-lg transition-all active:scale-95">
                    開始訓練
                </button>
                <button onclick="toggleFullscreen()" class="w-full py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-bold rounded-lg">
                    全螢幕模式
                </button>
            </div>
        </div>
    </div>

    <!-- YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let isPlaying = false;
        let gameInterval = null;
        let timerId = null;
        let metroInterval = null;
        let shrinkCounter = 0;
        let remainingTime = 0;
        let player; // YouTube Player
        let audioCtx = null;
        
        let config = {
            mode: 'single',
            type: 'E',
            dir: '4',
            sizeMode: 'manual', 
            speed: 2.0,
            baseSize: 200,
            bpm: 120,
            metroOn: false,
            musicOn: false,
            gameLength: 60
        };

        // YouTube API 初始化
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1',
                width: '1',
                videoId: '6HNWWIpuDxA',
                playerVars: {
                    'loop': 1,
                    'playlist': '6HNWWIpuDxA',
                    'autoplay': 0,
                    'controls': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            console.log("Music Player Ready");
        }

        function toggleMusic() {
            if (!player) return;
            config.musicOn = !config.musicOn;
            const btn = document.getElementById('musicBtn');
            if (config.musicOn) {
                player.playVideo();
                btn.innerText = "音樂播放中";
                btn.classList.replace('text-slate-400', 'text-emerald-400');
                btn.classList.add('border-emerald-500');
            } else {
                player.pauseVideo();
                btn.innerText = "已暫停";
                btn.classList.replace('text-emerald-400', 'text-slate-400');
                btn.classList.remove('border-emerald-500');
            }
        }

        const svgs = {
            E: (size) => `<svg width="${size}" height="${size}" viewBox="0 0 100 100"><path d="M20 20 H80 V35 H35 V42 H70 V57 H35 V65 H80 V80 H20 Z" fill="white"/></svg>`,
            C: (size) => `<svg width="${size}" height="${size}" viewBox="0 0 100 100"><path d="M50 15 C30 15 15 30 15 50 C15 70 30 85 50 85 C65 85 78 75 83 62 L68 58 C65 65 58 70 50 70 C39 70 30 61 30 50 C30 39 39 30 50 30 C58 30 65 35 68 42 L83 38 C78 25 65 15 50 15 Z" fill="white"/></svg>`
        };

        function playDrumClick() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function toggleSettings() {
            document.getElementById('settingsModal').classList.toggle('collapsed');
        }

        function setMode(m) {
            config.mode = m;
            updateUI();
            if(isPlaying) restartInterval();
        }

        function setType(t) {
            config.type = t;
            updateUI();
            if(isPlaying) refreshSymbols();
        }

        function setSizeMode(sm) {
            config.sizeMode = sm;
            shrinkCounter = 0; 
            updateUI();
            if(isPlaying) refreshSymbols();
        }

        function updateTimeSetting() {
            config.gameLength = parseInt(document.getElementById('timeSelect').value);
        }

        function toggleMetronome() {
            config.metroOn = !config.metroOn;
            const btn = document.getElementById('metroBtn');
            if(config.metroOn) {
                btn.innerText = "已開啟";
                btn.classList.replace('text-slate-400', 'text-emerald-400');
                btn.classList.add('border-emerald-500');
                if(isPlaying) startMetronome();
            } else {
                btn.innerText = "已關閉";
                btn.classList.replace('text-emerald-400', 'text-slate-400');
                btn.classList.remove('border-emerald-500');
                stopMetronome();
            }
        }

        function updateSettings() {
            config.speed = document.getElementById('speedIn').value;
            config.baseSize = parseInt(document.getElementById('sizeIn').value);
            config.bpm = parseInt(document.getElementById('bpmIn').value);
            document.getElementById('speedTxt').innerText = config.speed + 's';
            document.getElementById('sizeTxt').innerText = config.baseSize + 'px';
            document.getElementById('bpmTxt').innerText = config.bpm;
            if(isPlaying) {
                restartInterval();
                if(config.metroOn) startMetronome();
            }
        }

        function updateUI() {
            const btnGroups = ['m-', 't-', 'sz-'];
            btnGroups.forEach(prefix => {
                document.querySelectorAll(`[id^="${prefix}"]`).forEach(el => el.classList.remove('btn-active'));
            });
            document.getElementById('m-' + config.mode).classList.add('btn-active');
            document.getElementById('t-' + config.type).classList.add('btn-active');
            document.getElementById('sz-' + config.sizeMode).classList.add('btn-active');
            const sizeCtrl = document.getElementById('manualSizeControl');
            sizeCtrl.style.display = config.sizeMode === 'manual' ? 'block' : 'none';
            const divider = document.getElementById('centerDivider');
            const zoneRight = document.getElementById('zoneRight');
            const tagLeft = document.getElementById('tagLeft');
            const tagRight = document.getElementById('tagRight');
            if(config.mode === 'dual') {
                divider.classList.remove('hidden');
                tagLeft.classList.remove('opacity-0');
                tagRight.classList.remove('opacity-0');
                zoneRight.style.display = 'flex';
            } else {
                divider.classList.add('hidden');
                tagLeft.classList.add('opacity-0');
                tagRight.classList.add('opacity-0');
                zoneRight.style.display = 'none';
            }
        }

        function toggleGame() {
            if(!isPlaying) startGame();
            else stopGame();
        }

        function startGame() {
            isPlaying = true;
            shrinkCounter = 0;
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('statusIndicator');
            const timerBox = document.getElementById('timerDisplay');
            btn.innerText = "停止訓練";
            btn.classList.replace('bg-emerald-600', 'bg-red-600');
            status.innerText = "正在訓練";
            status.classList.replace('text-slate-400', 'text-emerald-400');
            remainingTime = config.gameLength;
            if(remainingTime > 0) {
                timerBox.classList.remove('hidden');
                updateTimerDisplay();
                timerId = setInterval(() => {
                    remainingTime--;
                    updateTimerDisplay();
                    if(remainingTime <= 0) stopGame();
                }, 1000);
            } else {
                timerBox.classList.add('hidden');
            }
            document.getElementById('settingsModal').classList.add('collapsed');
            restartInterval();
            if(config.metroOn) startMetronome();
        }

        function stopGame() {
            isPlaying = false;
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('statusIndicator');
            const timerBox = document.getElementById('timerDisplay');
            btn.innerText = "開始訓練";
            btn.classList.replace('bg-red-600', 'bg-emerald-600');
            status.innerText = "已暫停";
            status.classList.replace('text-emerald-400', 'text-slate-400');
            clearInterval(gameInterval);
            clearInterval(timerId);
            stopMetronome();
            document.getElementById('symbolLeft').innerHTML = '<span class="text-slate-600 font-bold text-2xl tracking-widest">READY</span>';
            document.getElementById('symbolRight').innerHTML = '';
        }

        function updateTimerDisplay() {
            const m = Math.floor(remainingTime / 60);
            const s = remainingTime % 60;
            document.getElementById('timerDisplay').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function restartInterval() {
            clearInterval(gameInterval);
            refreshSymbols();
            gameInterval = setInterval(refreshSymbols, config.speed * 1000);
        }

        function startMetronome() {
            stopMetronome();
            const ms = 60000 / config.bpm;
            metroInterval = setInterval(playDrumClick, ms);
        }

        function stopMetronome() {
            clearInterval(metroInterval);
        }

        function calculateCurrentSize() {
            const MAX = 400;
            const MIN = 30;
            if (config.sizeMode === 'manual') return config.baseSize;
            if (config.sizeMode === 'random') return Math.floor(Math.random() * (MAX - 40 + 1)) + 40;
            if (config.sizeMode === 'shrink') {
                const s = MAX * Math.pow(0.92, shrinkCounter);
                shrinkCounter++;
                return Math.max(MIN, Math.floor(s));
            }
            return config.baseSize;
        }

        function refreshSymbols() {
            const rotations = [0, 45, 90, 135, 180, 225, 270, 315];
            const size = calculateCurrentSize();
            const getSvg = () => svgs[config.type](size);
            const rotL = rotations[Math.floor(Math.random() * rotations.length)];
            const sLeft = document.getElementById('symbolLeft');
            sLeft.innerHTML = getSvg();
            sLeft.style.transform = `rotate(${rotL}deg) scale(0.6)`;
            if(config.mode === 'dual') {
                const rotR = rotations[Math.floor(Math.random() * rotations.length)];
                const sRight = document.getElementById('symbolRight');
                sRight.innerHTML = getSvg();
                sRight.style.transform = `rotate(${rotR}deg) scale(0.6)`;
                setTimeout(() => {
                    sLeft.style.transform = `rotate(${rotL}deg) scale(1)`;
                    sRight.style.transform = `rotate(${rotR}deg) scale(1)`;
                }, 50);
            } else {
                setTimeout(() => { sLeft.style.transform = `rotate(${rotL}deg) scale(1)`; }, 50);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        updateUI();
        updateSettings();
        updateTimeSetting();
    </script>
</body>
</html>
